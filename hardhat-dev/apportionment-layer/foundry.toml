[profile.default]
src      = "src"
script   = "script"
out      = "out"
libs     = ["lib"]
solc     = "0.8.24"
optimizer        = true
optimizer_runs   = 200

# HyperEVM testnet
[rpc_endpoints]
hyperevm_testnet = "https://rpc.hyperliquid-testnet.xyz/evm"
hyperevm_mainnet = "https://rpc.hyperliquid.xyz/evm"

[etherscan]
# HyperEVM does not yet have an official Etherscan-compatible explorer.
# Use hyperevmscan.io manually to verify.
hyperevm_testnet = { key = "placeholder", url = "https://hyperevmscan.io" }
